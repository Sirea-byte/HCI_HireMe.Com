<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - HireMe</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body class="page-auth">
    <div class="header">
        <button class="logo-button" aria-label="About Us" title="About Us" role="link" 
                tabindex="0" 
                onclick="window.location.href='aboutus.html'"
                onkeydown="if(event.key==='Enter'){window.location.href='aboutus.html'}"
                style="cursor: pointer;">
            <svg viewBox="0 0 340 230" style="width: 50px; height: auto; margin: 5px;">
                <defs>
                    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                        <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
                    </filter>
                </defs>
                <rect width="100%" height="100%" fill="var(--background-primary)"/>
                <polygon points="5,5 170,125 335,5 170,225" fill="#FFFFFF" filter="url(#shadow)"/>
            </svg>
        </button>
       <p style="color: white; font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;">HireMe.com</p>
       <div class="settings-container">
            <button class="gear-button" id="gearButton"  aria-label="Settings" title="Settings">
                <svg class="gear-icon" viewBox="0 0 24 24">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.63-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/>
                </svg>
            </button>
            <div class="settings-panel" id="settingsPanel">
                <h4 class="settings-title">Pengaturan</h4>

                <label for="themeSelect" class="settings-label">Tema</label>
                <select id="themeSelect" class="settings-select">
                <option value="light">Terang</option>
                <option value="dark">Gelap</option>
                </select>

                <label for="notifSelect" class="settings-label">Notifikasi Lowongan</label>
                <select id="notifSelect" class="settings-select">
                <option value="aktif">Aktif</option>
                <option value="nonaktif">Nonaktif</option>
                </select>

                <label for="langSelect" class="settings-label">Bahasa</label>
                <select id="langSelect" class="settings-select">
                <option value="id">Indonesia</option>
                <option value="en">English</option>
                </select>

            </div>
        </div>
    </div>
    <!-- Container utama -->
    <div class="auth-container">
        <div class="auth-box">
            <!-- Tabs -->
            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab active">Masuk</button>
                <button id="tab-register" class="auth-tab">Daftar</button>
            </div>

            <!-- Form Login -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label>Login dengan</label>
                    <select id="login-method" class="form-select">
                        <option value="email">Email</option>
                        <option value="telepon">Nomor Telepon</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="login-credential">Email / Nomor Telepon</label>
                    <input type="text" id="login-credential" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-input" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Masuk</button>
                <p class="auth-error" id="login-error"></p>
            </form>

            <!-- Form Register -->
            <form id="register-form" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="reg-nama">Nama Lengkap</label>
                        <input type="text" id="reg-nama" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-gender">Jenis Kelamin</label>
                        <select id="reg-gender" class="form-select">
                            <option value="">Pilih</option>
                            <option value="Laki-laki">Laki-laki</option>
                            <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-tgl">Tanggal Lahir</label>
                    <input type="date" id="reg-tgl" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="reg-alamat">Alamat</label>
                    <textarea id="reg-alamat" class="form-input" rows="2" required></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="reg-telepon">Nomor Telepon</label>
                        <input type="tel" id="reg-telepon" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email Aktif</label>
                        <input type="email" id="reg-email" class="form-input" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" class="form-input" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="reg-confirm">Konfirmasi Password</label>
                        <input type="password" id="reg-confirm" class="form-input" required minlength="6">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Daftar</button>
                <p class="auth-error" id="register-error"></p>
            </form>
            <div style="text-align: center; margin: 20px 0;">
                <p style="color: var(--sec-sub);">
                    Login/Daftar sebagai Penyedia Lowongan? 
                    <a href="boss-login.html" class="btn btn-outline" style="margin-left: 8px;">Klik Disini</a>
                </p>
            </div>
        </div>
    </div>
    <div class="footer">
        <div class="footer-option" aria-label="Cek CV" role="link" 
                tabindex="0" 
                onclick="window.location.href='cv.html'"
                onkeydown="if(event.key==='Enter'){window.location.href='cv.html'}"
                style="cursor: pointer;">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <line x1="10" y1="9" x2="9" y2="9"/>
            </svg>
            <span>CV</span>
        </div>
        <div class="footer-option active" aria-label="Beranda" role="link" 
                tabindex="0" 
                onclick="window.location.href='home.html'"
                onkeydown="if(event.key==='Enter'){window.location.href='home.html'}"
                style="cursor: pointer;">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
        </div>
        <div class="footer-option" aria-label="Cari Lowongan" role="link" 
            tabindex="0" 
            onclick="window.location.href='lowongan.html'"
            onkeydown="if(event.key==='Enter'){window.location.href='lowongan.html'}"
            style="cursor: pointer;">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <span>Cari</span>
        </div>

    </div>
</body>
</html>
