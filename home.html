<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - HireMe</title>
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
            document.documentElement.classList.add('dark');
            }
        })();
        // Data contoh satu lowongan (nanti bisa diganti dengan array kosong atau data dari sumber lain)

    </script>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="header">
        <button class="logo-button" aria-label="About Us" title="About Us" role="link" 
                tabindex="0" 
                onclick="window.location.href='aboutus.html'"
                onkeydown="if(event.key==='Enter'){window.location.href='aboutus.html'}"
                style="cursor: pointer;">
            <svg viewBox="0 0 340 230" style="width: 50px; height: auto; margin: 5px;">
                <defs>
                    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                        <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
                    </filter>
                </defs>
                <rect width="100%" height="100%" fill="var(--background-primary)"/>
                <polygon points="5,5 170,125 335,5 170,225" fill="#FFFFFF" filter="url(#shadow)"/>
            </svg>
        </button>
       <p style="color: white; font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;">HireMe.com</p>
       <div class="settings-container">
            <button class="gear-button" id="gearButton"  aria-label="Settings" title="Settings">
                <svg class="gear-icon" viewBox="0 0 24 24">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.63-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/>
                </svg>
            </button>
            <div class="settings-panel" id="settingsPanel">
                <h4 class="settings-title">Pengaturan</h4>

                <label for="themeSelect" class="settings-label">Tema</label>
                <select id="themeSelect" class="settings-select">
                <option value="light">Terang</option>
                <option value="dark">Gelap</option>
                </select>

                <label for="notifSelect" class="settings-label">Notifikasi Lowongan</label>
                <select id="notifSelect" class="settings-select">
                <option value="aktif">Aktif</option>
                <option value="nonaktif">Nonaktif</option>
                </select>

                <label for="langSelect" class="settings-label">Bahasa</label>
                <select id="langSelect" class="settings-select">
                <option value="id">Indonesia</option>
                <option value="en">English</option>
                </select>

            </div>
        </div>
    </div>
    <div class="welcome">
        <button class="theme-toggle" aria-label="Ganti Tema" title="Ganti Tema">
                🌙
            </button>
        <div class="welcome-text" style="margin: 10px;">
            <p class="welcome-title">Selamat Datang</p>
            <p class="welcome-subtitle">Semoga Mendapatkan Pekerjaan</p>
        </div>
        <button class="profile-button" aria-label="Profil Saya" title="Profil Saya" role="link" 
                tabindex="0" 
                onclick="window.location.href='profil.html'"
                onkeydown="if(event.key==='Enter'){window.location.href='profil.html'}"
                style="cursor: pointer;">
            ⚇
        </button>
    </div>
    <div class="reminder-login" id="reminderLogin">
        <div class="reminder-content">
            <span class="reminder-icon">🔔</span>
            <p class="reminder-text">
            Silakan <a href="register-login.html" class="reminder-link">login</a> untuk mengakses semua fitur secara maksimal.
            </p>
            <button class="reminder-close" id="closeReminder" aria-label="Tutup reminder">✕</button>
        </div>
    </div>
    <div class="history">
        <p class="history-text">Beranda</p>
        <div class="history-row">
           
                <div class="history-box" role="link" 
                tabindex="0" 
                onclick="window.location.href='lowongan.html'"
                onkeydown="if(event.key==='Enter'){window.location.href='lowongan.html'}"
                style="cursor: pointer;">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/>>
                    </svg>
                    <p>Semua<!--Angka--></p>
                    <p>Lowongan</p>
                </div>
            
            <div class="history-box" role="link" 
                tabindex="0" 
                onclick="window.location.href='dilihat.html'"
                onkeydown="if(event.key==='Enter'){window.location.href='dilihat.html'}"
                style="cursor: pointer;">
                <svg xmlns="http://w3.org" viewBox="0 0 100 100" width="300" height="300">
                    <path d="M 10 50 C 30 20, 70 20, 90 50 C 70 80, 30 80, 10 50 Z" fill="none" stroke="var(--btn-primary)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="50" cy="50" r="16" fill="none" stroke="var(--btn-primary)" stroke-width="5"/>
                    <line x1="61.5" y1="61.5" x2="76" y2="76" stroke="var(--btn-primary)" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="5" fill="var(--btn-primary)"/>
                </svg>
                <p class="dilihat-count">0</p>
                <p>Dilihat</p>
            </div>
            <div class="history-box" role="link" 
                tabindex="0" 
                onclick="window.location.href='terkirim.html'"
                onkeydown="if(event.key==='Enter'){window.location.href='terkirim.html'}"
                style="cursor: pointer;">
                <svg viewBox="0 0 500 500" xmlns="http://w3.org">
                    <polygon points="181,326 230,361 250,250" fill="var(--btn-primary)" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
                    <polygon points="181,326 181,426 230,361" fill="#ffffff" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
                    <polygon points="53,279 366,81 181,326" fill="var(--btn-primary)" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
                    <polygon points="366,81 366,396 181,326" fill="var(--btn-primary)" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
                </svg>
                <p class="terkirim-count">0</p>
                <p>Terkirim</p>
            </div>
        </div>
        <div class="history-row">
            <div class="history-box" role="link" 
                tabindex="0" 
                onclick="window.location.href='Disimpan.html'"
                onkeydown="if(event.key==='Enter'){window.location.href='Disimpan.html'}"
                style="cursor: pointer;">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
                </svg>
                <p class="disimpan-count">0 <!--Angka--></p>
                <p>Disimpan</p>
            </div>
            <div class="history-box" role="link" 
                tabindex="0" 
                onclick="window.location.href='wawancara.html'"
                onkeydown="if(event.key==='Enter'){window.location.href='wawancara.html'}"
                style="cursor: pointer;">
                 <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    <path d="M19.5 9.5c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2z" transform="scale(0.7) translate(10, 5)" />
                </svg>

                <p class="wawancara-count">0</p>
                <p>Wawancara</p>
            </div>
            <div class="history-box" role="link" 
                tabindex="0" 
                onclick="window.location.href='Status.html'"
                onkeydown="if(event.key==='Enter'){window.location.href='status.html'}"
                style="cursor: pointer;">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
                </svg>
                <p class="status-count">0</p>
                <p>Status</p>
            </div>
        </div>
    </div>
    <div class="search-section">
        <p class="history-text">Rekomendasi</p>
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" id="search-company" class="search-input" placeholder="Cari perusahaan...">
            </div>
            <div class="sort-wrapper">
                <label for="sort-options" class="sort-label">Urutkan:</label>
                <select id="sort-options" class="sort-select">
                    <option value="default">Default</option>
                    <option value="gaji-tertinggi">Gaji Tertinggi</option>
                    <option value="gaji-terendah">Gaji Terendah</option>
                    <option value="terbaru">Terbaru</option>
                    <option value="terlama">Terlama</option>
                </select>
                <label for="filter-pendidikan" class="sort-label">Pendidikan:</label>
                    <select id="filter-pendidikan" class="sort-select">
                        <option value="semua">Semua</option>
                        <option value="sd">SD</option>
                        <option value="smp">SMP</option>
                        <option value="sma">SMA</option>
                        <option value="s1">S1</option>
                        <option value="s2">S2</option>
                    </select>
            </div>
            <div class="sort-wrapper">
                <label for="filter-jenis" class="sort-label">Jenis:</label>
                <select id="filter-jenis" class="sort-select">
                    <option value="semua">Semua</option>
                    <option value="full-time">Full-Time</option>
                    <option value="part-time">Part-Time</option>
                    <option value="kontrak">Kontrak</option>
                    <option value="freelance">Freelance</option>
                </select>
            </div>
            <div id="list-lowongan" class="list-lowongan-container"></div>
        <div>
            <div id="list-lowongan" class="list-container"></div>
        </div>
    </div>
    <div class="footer">
        <div class="footer-option" aria-label="Cek CV" role="link" 
                tabindex="0" 
                onclick="window.location.href='cv.html'"
                onkeydown="if(event.key==='Enter'){window.location.href='cv.html'}"
                style="cursor: pointer;">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <line x1="10" y1="9" x2="9" y2="9"/>
            </svg>
            <span>CV</span>
        </div>
        <div class="footer-option active" aria-label="Beranda" role="link" 
                tabindex="0" 
                onclick="window.location.href='home.html'"
                onkeydown="if(event.key==='Enter'){window.location.href='home.html'}"
                style="cursor: pointer;">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
        </div>
        <div class="footer-option" aria-label="Cari Lowongan" role="link" 
            tabindex="0" 
            onclick="window.location.href='lowongan.html'"
            onkeydown="if(event.key==='Enter'){window.location.href='lowongan.html'}"
            style="cursor: pointer;">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <span>Cari</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
