<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - HireMe Business</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true' && sessionStorage.getItem('isBossLoggedIn') !== 'true') {
            window.location.href = 'boss-login.html';
        }
    </script>
    <script src="script.js" defer></script> <!-- untuk tema & pengaturan -->
    <script src="boss-home.js" defer></script> <!-- logika dashboard boss -->
</head>
<body class="page-boss">
    <div class="header">
        <button class="logo-button" aria-label="About Us" title="About Us" role="link" 
                tabindex="0" 
                onclick="window.location.href='aboutus.html'"
                onkeydown="if(event.key==='Enter'){window.location.href='aboutus.html'}"
                style="cursor: pointer;">
            <svg viewBox="0 0 340 230" style="width: 50px; height: auto; margin: 5px;">
                <defs>
                    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                        <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
                    </filter>
                </defs>
                <rect width="100%" height="100%" fill="var(--background-primary)"/>
                <polygon points="5,5 170,125 335,5 170,225" fill="#FFFFFF" filter="url(#shadow)"/>
            </svg>
        </button>
        <p style="color: white; font-family: 'Lucida Sans', sans-serif;">HireMe.com Business</p>
       
        <div class="settings-container">
            <button id="logout-boss" class="btn btn-outline" style="color:white; border-color:white; margin-left: auto;">Logout</button>
            <button class="gear-button" id="gearButton" aria-label="Settings" title="Settings">
                <!-- ikon gear -->
                <svg class="gear-icon" viewBox="0 0 24 24">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.63-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/>
                </svg>
            </button>
            <div class="settings-panel" id="settingsPanel">
                <h4 class="settings-title">Pengaturan</h4>
                <label for="themeSelect" class="settings-label">Tema</label>
                <select id="themeSelect" class="settings-select">
                    <option value="light">Terang</option>
                    <option value="dark">Gelap</option>
                </select>
                <label for="notifSelect" class="settings-label">Notifikasi Lowongan</label>
                <select id="notifSelect" class="settings-select">
                    <option value="aktif">Aktif</option>
                    <option value="nonaktif">Nonaktif</option>
                </select>
                <label for="langSelect" class="settings-label">Bahasa</label>
                <select id="langSelect" class="settings-select">
                    <option value="id">Indonesia</option>
                    <option value="en">English</option>
                </select>
            </div>
        </div>
    </div>

    <div class="welcome">
        <button class="theme-toggle" aria-label="Ganti Tema" title="Ganti Tema">🌙</button>
        <div class="welcome-text" style="margin: 10px;">
            <h2 class="welcome-title">Selamat Datang, <span id="company-name"></span></h2>
            <p class="welcome-subtitle">Kelola lowongan pekerjaan Anda di sini.</p>
        </div>
        <button class="profile-button" aria-label="Profil Saya" title="Profil Saya" role="link" 
                tabindex="0" 
                onclick="window.location.href='profil.html'"
                onkeydown="if(event.key==='Enter'){window.location.href='profil.html'}"
                style="cursor: pointer;">⚇</button>
    </div>

    <div class="history">
        <p class="history-text">Ringkasan</p>
        <div class="history-row">
            <div class="history-box">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/>
                </svg>
                <p id="total-pelamar">0</p>
                <p>Pelamar Melamar</p>
            </div>
            <div class="history-box">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    <circle cx="19" cy="9" r="2.5" fill="none" stroke="currentColor" stroke-width="2"/>
                </svg>
                <p id="total-wawancara">0</p>
                <p>Wawancara Dijadwalkan</p>
            </div>
        </div>
    </div>

    <!-- Area Lowongan Boss -->
    <div class="list-lowongan-dibuat">
        <div class="search-section">
            <p class="history-text">Lowongan Anda</p>
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" id="search-company" class="search-input" placeholder="Cari posisi...">
            </div>
            <div class="filter-group">
                <div class="sort-wrapper">
                    <label for="sort-options" class="sort-label">Urutkan:</label>
                    <select id="sort-options" class="sort-select">
                        <option value="default">Default</option>
                        <option value="gaji-tertinggi">Gaji Tertinggi</option>
                        <option value="gaji-terendah">Gaji Terendah</option>
                        <option value="terbaru">Terbaru</option>
                        <option value="terlama">Terlama</option>
                    </select>
                </div>
                <div class="filter-pendidikan-wrapper">
                    <label for="filter-pendidikan" class="sort-label">Pendidikan:</label>
                    <select id="filter-pendidikan" class="sort-select">
                        <option value="semua">Semua</option>
                        <option value="sd">SD</option>
                        <option value="smp">SMP</option>
                        <option value="sma">SMA</option>
                        <option value="s1">S1</option>
                        <option value="s2">S2</option>
                    </select>
                </div>
                <div class="filter-jenis-wrapper">
                    <label for="filter-jenis" class="sort-label">Jenis:</label>
                    <select id="filter-jenis" class="sort-select">
                        <option value="semua">Semua</option>
                        <option value="full-time">Full-Time</option>
                        <option value="part-time">Part-Time</option>
                        <option value="kontrak">Kontrak</option>
                        <option value="freelance">Freelance</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" id="btn-tambah-lowongan" style="margin-top:10px;">➕ Tambah Lowongan</button>
        </div>

        <!-- Daftar Lowongan -->
        <div id="boss-lowongan-container" class="list-lowongan-container"></div>
    </div>

    <!-- Modal Tambah/Edit Lowongan -->
    <div class="modal-overlay" id="modal-lowongan">
        <div class="modal-box">
            <h3 id="modal-title">Tambah Lowongan Baru</h3>
            <form id="form-lowongan">
                <input type="hidden" id="lowongan-id">
                <label>Posisi</label>
                <input type="text" id="posisi" required>
                <label>Lokasi (Kota)</label>
                <input type="text" id="lokasi" required>
                <label>Jenis</label>
                <select id="jenis">
                    <option value="Full-time">Full-time</option>
                    <option value="Part-time">Part-time</option>
                    <option value="Kontrak">Kontrak</option>
                    <option value="Freelance">Freelance</option>
                </select>
                <label>Gaji (contoh: Rp 5.000.000 - 7.000.000)</label>
                <input type="text" id="gaji">
                <label>Pendidikan</label>
                <input type="text" id="pendidikan" placeholder="contoh: S1 Teknik Informatika">
                <label>Jam Kerja (contoh: 08:00 - 17:00)</label>
                <input type="text" id="jam-kerja">
                <label>Umur (contoh: Maks. 30 tahun)</label>
                <input type="text" id="umur">
                <label>Tags (pisahkan dengan koma, contoh: Remote, Asuransi)</label>
                <input type="text" id="tags" placeholder="Remote, Asuransi">
                <label>Deskripsi</label>
                <textarea id="deskripsi" rows="3"></textarea>
                <label>Email Perusahaan (untuk lamaran)</label>
                <input type="email" id="email-perusahaan" required>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" id="btn-batal">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modal-detail">
        <div class="modal-box modal-large">
            <h3>Detail Lowongan</h3>
            <div id="detail-content"></div>
            <button class="btn btn-outline" id="btn-tutup-detail">Tutup</button>
        </div>
    </div>
    <div class="modal-overlay" id="modal-detail-pelamar">
        <div class="modal-box modal-large" style="color: var(--main-sub);">
            <h3 style="color: var(--main-sub);">Detail Pelamar</h3>
            <div id="detail-pelamar-content" style="color: var(--main-sub);" ></div>
            <div id="pelamar-actions" style="margin-top:15px;" style="color: var(--main-sub);"></div>
            <button class="btn btn-primary" id="btn-tutup-detail-pelamar">Tutup</button>
        </div>
    </div>


    <script>
        const boss = JSON.parse(sessionStorage.getItem('currentBoss'));
        if (boss) {
            document.getElementById('company-name').textContent = boss.company;
        }

        // Logout
        document.getElementById('logout-boss').addEventListener('click', () => {
            sessionStorage.removeItem('isBossLoggedIn');
            sessionStorage.removeItem('currentBoss');
            window.location.href = 'home.html';
        });
    </script>
</body>
</html>
